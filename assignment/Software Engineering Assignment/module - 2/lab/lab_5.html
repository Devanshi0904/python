<!-- 1. In how many ways can a CSS be integrated as a web page? 
-CSS can be integrated in 3 ways:

• Inline CSS
•Internal CSS
• External CSS -->

<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        h2{

        }

</head>
