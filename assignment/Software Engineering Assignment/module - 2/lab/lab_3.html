<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>
</head>
<body>
    <h2>College Management System</h2>
    <table border="1">
        <tr>
            <th rowspan="2">Department</th>
            <th colspan="2">Staff</th>
        </tr>
        <tr>
            <th>Teaching</th>
            <th>Non Teaching</th>
        </tr>

        <tr>
            <td>Computer</td>
            <td>20</td>
            <td>5</td>
        </tr>

        <tr>
            <td>Commerce</td>
            <td>15</td>
            <td>3</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>18</td>
            <td>4</td>
        </tr>
    </table>

    <h2>Student Table</h2>
    <table border="1">
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Devanshi</td>
            <td>B.Com</td>
            <td>Surat</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Nilay</td>
            <td>MCA</td>
            <td>Mumbai</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Tisha</td>
            <td>BBA</td>
            <td>Delhi</td>
        </tr>

    </table>
</body>
</html>
